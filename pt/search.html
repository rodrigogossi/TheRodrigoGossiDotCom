  <!-- Evitar FOUC (Flash of Unstyled Content) do Tema Escuro -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

  <!-- Lógica de Pesquisa Local -->
  <script>
    const posts = [
      {
        title: "Conhecimento, a arte de reconstruir pontes.",
        url: "posts/conhecimento-a-arte-de-reconstruir-pontes.html",
        date: "12 Apr 2026",
        excerpt: "Para mim a única coisa que deveríamos – fundamentalmente – aprender na nossa jornada pela vida é não sermos vítimas da própria existência. Jesus falava em sermos herdeiros do reino dos céus..."
      },
      {
        title: "Vida, Amor e Solidão - Osho",
        url: "posts/vida-amor-e-solidao-osho.html",
        date: "11 Feb 2026",
        excerpt: "Neste livro, o autor - Osho - um grande filósofo indiano discorre sobre sua visão sobre o amor, seu significado e como se aplica na vida cotidiana. A peça central de sua abordagem, em todo seu ensinamento..."
      },
      {
        title: "Metamorfose: uma reflexão sobre a utilidade da vida",
        url: "posts/metamorfose-uma-reflexao-sobre-a-utilidade-da-vida.html",
        date: "20 Ago 2025",
        excerpt: "Recentemente, li o livro A Metamorfose, de Franz Kafka (publicado em 1915), no qual acompanhamos a história de Gregor Samsa, um jovem no início da vida adulta. Ele trabalha como caixeiro-viajante..."
      },
      {
        title: "O que é mindfullness e como pode te ajudar a ter uma vida mais tranquila e com mais propósito",
        url: "posts/o-que-e-mindfullness-e-como-pode-te-ajudar-a-ter-uma-vida-mais-tranquila-e-com-mais-proposito.html",
        date: "22 Jan 2024",
        excerpt: "Vivemos em uma sociedade agitada, focada majoritariamente em resultados e em buscar aceitação coletiva, buscamos incansavelmente aumentar nossa produtividade para produzir e consumir mais..."
      },
      {
        title: "Como ter 2 bancadas de trabalho aumentou minha criatividade",
        url: "posts/como-ter-2-bancadas-de-trabalho-aumentou-minha-criatividade.html",
        date: "19 Jan 2024",
        excerpt: "\"Em nossa era digital, não esqueça de usar suas digitais\" - Lynda Barry Vivemos em uma mudança de década, conforme apontado por Domenico de Masi em \"O ócio criativo\" (2001), esta mudança..."
      },
      {
        title: "Redação ODS",
        url: "posts/redacao-ods.html",
        date: "22 Nov 2022",
        excerpt: "A igualdade de oportunidades é um princípio segundo o qual todas as pessoas devem ser tratadas de forma igual em suas diferenças e devem ter acesso a uma educação de qualidade..."
      },
      {
        title: "NextCloud e Ubuntu Server: Como criei meu servidor em casa com um notebook velho!",
        url: "posts/nextcloud-e-ubuntu-server-como-criei-meu-servidor-em-casa-com-um-notebook-velho.html",
        date: "08 Set 2022",
        excerpt: "Os anos se passam, e com eles, aprimoramos as tecnologias que fazem parte do nosso cotidiano. Provavelmente, em algum momento, você precisou de um novo computador ou notebook..."
      },
      {
        title: "As músicas do Minecraft são tão…",
        url: "posts/as-musicas-do-minecraft-sao-tao.html",
        date: "07 Jun 2022",
        excerpt: "Estes dias, enquanto explorava o Spotify, deparei-me quase por acaso com uma playlist de trilhas sonoras do Minecraft. Não sei bem por quê, mas achei tão inesperado que decidi dar o play..."
      }
    ];

    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase().trim();
      
      if (query.length === 0) {
        searchResults.innerHTML = '<p style="color: var(--accent2);">Digite termos para iniciar a busca.</p>';
        return;
      }

      const filtered = posts.filter(post => 
        post.title.toLowerCase().includes(query) || 
        post.excerpt.toLowerCase().includes(query)
      );

      if (filtered.length === 0) {
        searchResults.innerHTML = '<p style="color: var(--accent2);">Nenhum artigo encontrado para esta busca.</p>';
        return;
      }

      let html = '';
      filtered.forEach(post => {
        html += `
          <div class="post-item" style="margin-bottom: 1.8em;">
            <a href="${post.url}" class="post-link" style="font-size: 1.15rem; font-weight: bold; text-decoration: underline; color: var(--text);">${post.title}</a>
            <span class="post-date" style="font-size: 0.8em; color: var(--accent2); margin-left: 0.75rem;">${post.date}</span>
            <p style="font-size: 0.95rem; line-height: 1.5; margin-top: 0.4em; color: var(--accent2);">${post.excerpt}</p>
          </div>
        `;
      });
      searchResults.innerHTML = html;
    });
  </script>

  <!-- Scripts -->
  <script src="../js/main.js" defer></script>
